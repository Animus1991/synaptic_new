name: CI

on:
  push:
    branches: [main, master, 'option-*']
  pull_request:

jobs:
  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:fast

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - working-directory: server
        run: npm ci
      - working-directory: server
        run: npm run typecheck
      - working-directory: server
        run: npm test

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run doc-lint

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true

  a11y:
    # Dedicated axe-core + Playwright WCAG 2.1 AA gate. Fails the build on
    # any serious/critical violation across Lesson, Workspace panels, the
    # command palette, and all targeted viewports (mobile → desktop-xl).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:a11y
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  chunk-recovery:
    # Dedicated gate for dynamic-import / chunk-load failure recovery.
    # Runs the chunk-failure recovery + per-flow specs headless and fails
    # the build if any flow does not surface a Try-again/Reload affordance
    # or cannot retry in-place without a full reload.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:chunk-recovery
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chunk-recovery-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

