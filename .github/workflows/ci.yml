name: CI

on:
  push:
    branches: [main, master, 'option-*']
  pull_request:

jobs:
  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run i18n-lint
      - run: npm test
      - run: npm run build:fast

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - working-directory: server
        run: npm ci
      - working-directory: server
        run: npm run typecheck
      - working-directory: server
        run: npm test

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run doc-lint

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true

  a11y:
    # Dedicated axe-core + Playwright WCAG 2.1 AA gate. Fails the build on
    # any serious/critical violation across Lesson, Workspace panels, the
    # command palette, and all targeted viewports (mobile → desktop-xl).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:a11y
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  chunk-recovery:
    # Dedicated gate for dynamic-import / chunk-load failure recovery.
    # Runs the chunk-failure recovery + per-flow specs headless and fails
    # the build if any flow does not surface a Try-again/Reload affordance
    # or cannot retry in-place without a full reload.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:chunk-recovery
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chunk-recovery-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run eval

  varian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test -- src/lib/varianCh31Fixtures.test.ts

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:visual
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  perf-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:perf
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: perf-budget-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  perf-budget-prod:
    # B11 prod gate — build + vite preview; warm prefetch then Continue ≤20s (1.2s stretch annotation until PROD_STRETCH_GATE=1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/cache@v4
        with:
          path: .github/perf/b11-prod-stretch-history.json
          key: b11-prod-stretch-history-v1
          restore-keys: b11-prod-stretch-history-v1
      - run: npm ci
      - run: npm run build:fast
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:perf:prod
        env:
          CI: true
          PLAYWRIGHT_PROD_PERF: '1'
          PROD_INTERACTIVE_BUDGET_MS: '20000'
          # PROD_STRETCH_GATE: '1'  # enable when perf-budget-prod summary reports gate ready (median ≤1.2s for 10 runs)
      - name: B11 stretch rolling median
        if: success()
        run: npm run b11:stretch-tracker
        env:
          B11_STRETCH_WINDOW: '10'
      - uses: actions/cache/save@v4
        if: success()
        with:
          path: .github/perf/b11-prod-stretch-history.json
          key: b11-prod-stretch-history-v1
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: perf-budget-prod-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  # W0 — supply-chain + secret scan gates (INFRA-CI-01 / INFRA-CI-02)
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Client audit (high+)
        run: npm audit --audit-level=high
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - working-directory: server
        run: npm ci
      - name: Server audit (high+)
        working-directory: server
        run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

