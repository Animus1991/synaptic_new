<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0f0a1e" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('synapse:theme-preference');
          var pref = raw ? JSON.parse(raw) : 'dark';
          var resolved = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
            : pref;
          document.documentElement.setAttribute('data-theme', resolved);
          document.documentElement.style.colorScheme = (resolved === 'light' || resolved === 'spectrum' || resolved === 'minimal') ? 'light' : 'dark';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.content = resolved === 'light' ? '#faf8f5'
              : resolved === 'spectrum' ? '#f7f5ff'
              : resolved === 'minimal' ? '#ffffff'
              : resolved === 'minimal-dark' ? '#0d1117'
              : resolved === 'blueprint' ? '#020617'
              : '#0f0a1e';
          }
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Synapse — Upload your material. AI builds your personalized tutor-course. From static notes to adaptive tutoring." />
    <script>
      (function () {
        try {
          var l = document.createElement('link');
          l.rel = 'canonical';
          l.href = window.location.origin + window.location.pathname;
          document.head.appendChild(l);
        } catch (e) {}
      })();
    </script>

    <meta property="og:title" content="Synapse — AI-Powered Adaptive Learning" />
    <meta property="og:description" content="Upload your material. AI builds your personalized tutor-course. From static notes to adaptive tutoring." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Synapse — AI-Powered Adaptive Learning" />
    <meta name="twitter:description" content="Upload your material. AI builds your personalized tutor-course. From static notes to adaptive tutoring." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Greek:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Synapse — AI-Powered Adaptive Learning</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
